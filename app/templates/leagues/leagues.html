{% extends "base.html" %}
{% block title %}Mini Leagues — World Cup Fantasy 2026{% endblock %}
{% block content %}
<div class="flex flex-col gap-6 max-w-5xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-text-primary">MINI LEAGUES</h1>
        <div class="flex gap-2">
            <button class="bg-primary-container text-on-primary-container font-label-caps text-label-caps px-4 py-2.5 rounded-lg font-bold hover:brightness-110" id="create-league-btn" type="button">Create League</button>
            <button class="border border-primary text-primary font-label-caps text-label-caps px-4 py-2.5 rounded-lg hover:bg-primary/10" id="join-league-btn" type="button">Join League</button>
        </div>
    </div>

    <div id="leagues-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

    <div id="standings-panel" class="bg-surface border border-outline-variant rounded-xl overflow-hidden" style="display:none">
        <div class="p-4 border-b border-outline-variant">
            <h2 id="standings-title" class="font-headline-md text-headline-md uppercase"></h2>
        </div>
        <table class="data-table" id="standings-table">
            <thead><tr><th>Rank</th><th>User</th><th style="text-align:right">Points</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="create-modal" class="modal" style="display:none">
    <div class="modal-content">
        <h3>Create League</h3>
        <input type="text" id="league-name" placeholder="League name">
        <label class="flex items-center gap-2 font-body-sm text-on-surface-variant">
            <input type="checkbox" id="league-public" class="rounded border-outline-variant"> Public league
        </label>
        <button class="w-full bg-primary-container text-on-primary-container font-bold py-3 rounded-lg" id="confirm-create" type="button">Create</button>
        <button class="w-full border border-outline-variant text-on-surface py-2 rounded-lg" id="cancel-create" type="button">Cancel</button>
    </div>
</div>

<div id="join-modal" class="modal" style="display:none">
    <div class="modal-content">
        <h3>Join League</h3>
        <input type="text" id="league-code" placeholder="6-char invite code" maxlength="6">
        <button class="w-full bg-primary-container text-on-primary-container font-bold py-3 rounded-lg" id="confirm-join" type="button">Join</button>
        <button class="w-full border border-outline-variant text-on-surface py-2 rounded-lg" id="cancel-join" type="button">Cancel</button>
    </div>
</div>

<script>
async function loadLeagues() {
    const res = await fetch('/api/leagues');
    const data = await res.json();
    const container = document.getElementById('leagues-list');
    if (!data.success) {
        container.innerHTML = '<p class="text-on-surface-variant col-span-full text-center py-12">Please <a class="text-primary underline" href="/login">login</a> to view leagues.</p>';
        return;
    }
    if (!data.leagues.length) {
        container.innerHTML = '<p class="text-on-surface-variant col-span-full text-center py-12">No leagues yet. Create or join one to get started.</p>';
        return;
    }
    container.innerHTML = data.leagues.map(l => `
        <div class="bg-surface border border-outline-variant rounded-xl p-5 hover:border-primary/40 transition-colors">
            <h3 class="font-headline-md text-headline-md text-on-surface mb-2">${l.name}</h3>
            <p class="font-body-sm text-body-sm text-on-surface-variant mb-1">Code: <strong class="text-primary font-stat-md">${l.code}</strong> · Members: ${l.member_count}</p>
            <p class="font-body-sm text-body-sm text-on-surface-variant mb-4">Your rank: <strong class="text-on-surface">${l.my_rank || '—'}</strong> (${l.my_points || 0} pts)</p>
            <button type="button" class="view-standings border border-primary text-primary font-label-caps text-label-caps px-4 py-2 rounded-lg hover:bg-primary/10" data-id="${l.id}">View Standings</button>
        </div>
    `).join('');

    document.querySelectorAll('.view-standings').forEach(btn => {
        btn.addEventListener('click', () => loadStandings(btn.dataset.id));
    });
}

async function loadStandings(leagueId) {
    const res = await fetch(`/api/leagues/${leagueId}/standings`);
    const data = await res.json();
    document.getElementById('standings-panel').style.display = 'block';
    document.getElementById('standings-title').textContent = data.league.name + ' Standings';
    document.querySelector('#standings-table tbody').innerHTML = data.standings.map(s => `
        <tr>
            <td style="font-family:JetBrains Mono,monospace;color:${s.rank === 1 ? '#e5c363' : 'inherit'}">${s.rank || '—'}</td>
            <td style="font-weight:600">${s.username}</td>
            <td style="text-align:right;font-family:JetBrains Mono,monospace;font-weight:700;color:#e5c363">${s.points}</td>
        </tr>
    `).join('');
    document.getElementById('standings-panel').scrollIntoView({ behavior: 'smooth' });
}

document.getElementById('create-league-btn').onclick = () => {
    document.getElementById('create-modal').style.display = 'flex';
};
document.getElementById('cancel-create').onclick = () => {
    document.getElementById('create-modal').style.display = 'none';
};
document.getElementById('confirm-create').onclick = async () => {
    const res = await fetch('/api/leagues', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            name: document.getElementById('league-name').value,
            is_public: document.getElementById('league-public').checked,
        }),
    });
    const data = await res.json();
    if (data.success) {
        document.getElementById('create-modal').style.display = 'none';
        loadLeagues();
    } else {
        alert(data.message || 'Failed to create league');
    }
};

document.getElementById('join-league-btn').onclick = () => {
    document.getElementById('join-modal').style.display = 'flex';
};
document.getElementById('cancel-join').onclick = () => {
    document.getElementById('join-modal').style.display = 'none';
};
document.getElementById('confirm-join').onclick = async () => {
    const res = await fetch('/api/leagues/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: document.getElementById('league-code').value }),
    });
    const data = await res.json();
    if (data.success) {
        document.getElementById('join-modal').style.display = 'none';
        loadLeagues();
    } else {
        alert(data.message);
    }
};

loadLeagues();
</script>
{% endblock %}
