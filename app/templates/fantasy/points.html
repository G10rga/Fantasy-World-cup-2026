{% extends "base.html" %}
{% block title %}Points — World Cup Fantasy 2026{% endblock %}
{% block content %}
<div class="flex flex-col gap-6 max-w-5xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-text-primary">POINTS</h1>
        <div class="bg-surface border border-outline-variant rounded-xl px-5 py-3 font-stat-md text-stat-md text-on-surface-variant">
            Total <span id="total-pts" class="font-headline-lg text-headline-lg text-primary ml-2">—</span>
        </div>
    </div>

    <div id="points-breakdown">
        <div class="text-center py-16 text-on-surface-variant font-body-sm">Loading your points…</div>
    </div>
</div>

<script>
async function loadPoints() {
    const res = await fetch('/api/team/points', { credentials: 'same-origin' });
    const data = await res.json().catch(() => ({ success: false }));
    const container = document.getElementById('points-breakdown');
    if (!data.success) {
        container.innerHTML = `
            <div class="text-center py-20 text-on-surface-variant">
                <span class="material-symbols-outlined text-primary text-5xl mb-4 block opacity-40">analytics</span>
                <p><a href="/login" class="text-primary underline">Sign in</a> to view your points history</p>
            </div>`;
        return;
    }

    const total = data.breakdown.reduce((s, md) => s + md.total_points, 0);
    document.getElementById('total-pts').textContent = total;

    if (!data.breakdown.length) {
        container.innerHTML = '<div class="text-center py-16 text-on-surface-variant font-body-sm">No matchday points yet</div>';
        return;
    }

    container.innerHTML = data.breakdown.map(md => `
        <div class="bg-surface border border-outline-variant rounded-xl overflow-hidden mb-6">
            <div class="p-4 border-b border-outline-variant bg-surface-container-low flex items-center justify-between flex-wrap gap-2">
                <h3 class="font-headline-md text-headline-md uppercase">Matchday ${md.matchday}</h3>
                <span class="font-headline-lg text-headline-lg text-primary">${md.total_points} <span class="text-on-surface-variant text-sm font-body-sm">pts</span></span>
            </div>
            <div class="overflow-x-auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>Position</th>
                            <th style="text-align:center">Mult</th>
                            <th style="text-align:right">Points</th>
                            <th style="text-align:center">Role</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${md.players.map(p => `
                            <tr>
                                <td style="font-weight:600">${p.player?.name || '—'}</td>
                                <td><span class="font-stat-md text-xs bg-surface-variant px-1.5 py-0.5 rounded">${p.player?.position || '—'}</span></td>
                                <td style="text-align:center;font-family:JetBrains Mono,monospace;color:${p.multiplier > 1 ? '#e5c363' : '#9CA3AF'}">${p.multiplier}×</td>
                                <td style="text-align:right;font-family:JetBrains Mono,monospace;font-weight:700;color:${p.matchday_points > 0 ? '#4edea3' : '#9CA3AF'}">${p.matchday_points}</td>
                                <td style="text-align:center">
                                    ${p.is_starting
                                        ? '<span class="text-tertiary text-xs font-semibold">Starting</span>'
                                        : '<span class="text-on-surface-variant text-xs">Bench</span>'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    `).join('');
}

loadPoints();
</script>
{% endblock %}
