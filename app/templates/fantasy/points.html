{% extends "base.html" %}
{% block title %}Points — WC2026 Fantasy{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Points Breakdown</h1>
    <div id="total-pts-display" style="margin-left:auto;font-family:var(--font-mono);font-size:13px;color:var(--chalk-muted);background:var(--pitch-mid);border:1px solid var(--card-border);padding:6px 16px;border-radius:var(--r)">
        Total: <span id="total-pts" style="font-family:var(--font-display);font-size:22px;color:var(--gold);letter-spacing:1px">—</span> pts
    </div>
</div>

<div id="points-breakdown">
    <div style="text-align:center;padding:60px;color:var(--chalk-muted)">Loading your points…</div>
</div>

<script>
async function loadPoints() {
    const res = await fetch('/api/team/points');
    const data = await res.json();
    const container = document.getElementById('points-breakdown');
    if (!data.success) {
        container.innerHTML = `
            <div style="text-align:center;padding:80px;color:var(--chalk-muted)">
                <div style="font-family:var(--font-display);font-size:48px;color:var(--gold);opacity:0.3;margin-bottom:16px">?</div>
                <p><a href="/login" style="color:var(--gold)">Sign in</a> to view your points history</p>
            </div>`;
        return;
    }

    const total = data.breakdown.reduce((s, md) => s + md.total_points, 0);
    document.getElementById('total-pts').textContent = total;

    container.innerHTML = data.breakdown.map(md => `
        <div class="matchday-block">
            <h3 style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
                <span>Matchday ${md.matchday}</span>
                <span style="font-family:var(--font-display);font-size:32px;color:var(--gold);letter-spacing:1px">${md.total_points} <span style="font-size:16px;color:var(--chalk-muted)">pts</span></span>
            </h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Position</th>
                        <th style="text-align:center">Mult</th>
                        <th style="text-align:right">Points</th>
                        <th style="text-align:center">Role</th>
                    </tr>
                </thead>
                <tbody>
                    ${md.players.map(p => `
                        <tr>
                            <td style="font-weight:600">${p.player?.name || '—'}</td>
                            <td>
                                <span class="player-pos ${p.player?.position || ''}" style="font-size:10px">
                                    ${p.player?.position || '—'}
                                </span>
                            </td>
                            <td style="text-align:center;font-family:var(--font-mono);color:${p.multiplier > 1 ? 'var(--gold)' : 'var(--chalk-muted)'}">${p.multiplier}×</td>
                            <td style="text-align:right;font-family:var(--font-mono);font-weight:700;color:${p.matchday_points > 0 ? 'var(--success)' : 'var(--chalk-muted)'}">${p.matchday_points}</td>
                            <td style="text-align:center">
                                ${p.is_starting
                                    ? '<span style="font-size:11px;font-weight:600;color:var(--success)">Starting</span>'
                                    : '<span style="font-size:11px;color:var(--chalk-muted)">Bench</span>'}
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `).join('');
}

loadPoints();
</script>
{% endblock %}
